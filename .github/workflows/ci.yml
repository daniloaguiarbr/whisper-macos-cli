name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTUP_MAX_RUST_VERSION: stable
  RUST_BACKTRACE: "1"

jobs:
  fmt:
    name: Format
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo clippy --no-default-features -- -D warnings

  test:
    name: Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install nextest
        run: cargo install --locked cargo-nextest
      - name: cargo-nextest (default profile)
        run: cargo nextest run --all-features -P ci
      - name: cargo-nextest (no default features)
        run: cargo nextest run --no-default-features -P ci
      - name: doc tests
        run: cargo test --doc --all-features

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v1
        with:
          command: check bans licenses sources

  geiger:
    name: cargo-geiger
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-geiger
      - run: cargo geiger --all-features --output-format GitHubMarkdown

  msrv:
    name: MSRV
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - run: cargo check --all-features

  doc:
    name: Documentation
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

  coverage:
    name: Coverage
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        env:
          CARGO_BUILD_RUSTC_WRAPPER: ""
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Fail under threshold
        env:
          CARGO_BUILD_RUSTC_WRAPPER: ""
        run: cargo llvm-cov --all-features --workspace --fail-under-lines 70
      - uses: codecov/codecov-action@v4
        with:
          file: lcov.info
          fail_ci_if_error: true
          threshold: 5%
          target: 70%

  feature-matrix:
    name: Feature Matrix
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-hack
      - run: cargo hack test --each-feature
      - run: cargo hack test --feature-powerset

  publish-check:
    name: Publish Dry-Run
    runs-on: macos-14
    needs: [fmt, clippy, test, doc]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --dry-run --allow-dirty
