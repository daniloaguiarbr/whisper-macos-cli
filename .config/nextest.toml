[profile.default]
test-threads = "num-cpus"
slow-timeout = { period = "60s", terminate-after = 2 }
fail-fast = true
retries = 0

[profile.ci]
test-threads = "num-cpus"
slow-timeout = { period = "300s", terminate-after = 2 }
fail-fast = false
retries = 1
final-status-level = "slow"

[profile.heavy]
test-threads = 1
slow-timeout = { period = "1800s", terminate-after = 1 }
fail-fast = false
retries = 0

[profile.quick]
test-threads = "num-cpus"
slow-timeout = { period = "120s", terminate-after = 1 }
fail-fast = true
retries = 0
