[build]
rustc-wrapper = ""

[target.aarch64-apple-darwin]
rustflags = [
    "-C", "target-cpu=apple-m1",
]

[target.x86_64-apple-darwin]
rustflags = [
    "-C", "target-cpu=native",
]

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-Wl,--build-id=sha256",
    "-C", "target-cpu=native",
]

[target.aarch64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-Wl,--build-id=sha256",
    "-C", "target-cpu=native",
]

[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "target-cpu=native",
]

[term]
verbose = false
color = "auto"

[registries.crates-io]
protocol = "sparse"
